version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: loss_weight_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lossweight
    ports:
      - "5434:5432"  # 宿主机 5432=quant_postgres / 5433=pgvector 被占，本项目用 5434
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: loss_weight_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Chroma Vector Database (for AI Memory)
  chroma:
    image: chromadb/chroma:latest
    container_name: loss_weight_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma

  # Backend API (Development - Go)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: loss_weight_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lossweight
      REDIS_URL: redis://redis:6379
      CHROMA_URL: http://chroma:8000
      SECRET_KEY: your-secret-key-change-in-production
      DEBUG: "true"
      GIN_MODE: debug
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    command: go run cmd/server/main.go

volumes:
  pgdata:
  redis_data:
  chroma_data:
