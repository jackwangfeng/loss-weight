# Flutter Application
# Loss Weight AI Assistant

name: loss_weight
description: AI-powered weight loss assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  
  # State Management
  provider: ^6.1.1
  # riverpod: ^2.4.9
  
  # Network
  dio: ^5.4.0
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Routing
  go_router: ^13.0.0
  
  # Utils
  intl: any
  path_provider: ^2.1.2
  
  # Charts
  fl_chart: ^0.66.0
  
  # Camera
  camera: ^0.10.5

  # Voice input（语音转文字，iOS/Android/Web 三端通吃，web 走浏览器 SpeechRecognition）
  speech_to_text: ^6.6.0

  # Markdown 渲染（AI 回复里的 **加粗**、列表、代码块）
  flutter_markdown: ^0.7.1

  # Web 端流式 HTTP（Dio 在 Web 上会 buffer 整个响应，用 fetch_client 绕过）
  fetch_client: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
  
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
