# Flutter Application
# Loss Weight AI Assistant

name: loss_weight
description: AI-powered weight loss assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  
  # State Management
  provider: ^6.1.1
  # riverpod: ^2.4.9
  
  # Network
  dio: ^5.4.0
  http: ^1.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Routing
  go_router: ^13.0.0
  
  # Utils
  intl: any
  path_provider: ^2.1.2
  
  # Charts
  fl_chart: ^0.66.0

  # Voice input（语音转文字，iOS/Android/Web 三端通吃，web 走浏览器 SpeechRecognition）
  # 语音：只用 record 录音，转写走云端（backend /v1/ai/transcribe → Gemini）。
  # 放弃 speech_to_text（iOS Swift/ObjC module 冲突 + Android 老 API 依赖，
  # 两头都带病）。Gemini 云端效果远好于本地 SFSpeechRecognizer，尤其中文
  # 口语化 + 数字单位 + 中英混输。
  flutter_sound: ^9.28.0
  permission_handler: ^11.3.1

  # Markdown 渲染（AI 回复里的 **加粗**、列表、代码块）
  flutter_markdown: ^0.7.1

  # Web 端流式 HTTP（Dio 在 Web 上会 buffer 整个响应，用 fetch_client 绕过）
  fetch_client: ^1.1.2

  # Google Sign-In — 海外版主登录方式。v7 用 GIS credential flow，
  # web 也能拿到 id_token（v6 web 只给 access_token 不给 id_token）。
  google_sign_in: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
  
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
